services:
  vohive:
    build:
      context: .
      args:
        VOHIVE_VERSION: v1.5.5-10-gf9eb85d
    image: yinyuangu/vohive:latest
    container_name: vohive
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      TZ: Asia/Shanghai
      CONFIG_PATH: /app/config/config.yaml
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - /dev:/dev

